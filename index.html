<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Nexstream</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0b0b0b;
color:white;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px;
background:black;
}

.logo{
font-size:30px;
font-weight:bold;
color:red;
}

.banner{
padding:80px 40px;
background:linear-gradient(90deg,#000,#111);
}

.container{
padding:40px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:25px;
}

.card{
background:#141414;
border-radius:10px;
padding:20px;
text-align:center;
}

.card img{
width:120px;
margin-bottom:10px;
}

.price{
color:#00ff88;
font-size:18px;
margin:10px 0;
}

button{
background:red;
border:none;
padding:10px 20px;
color:white;
border-radius:6px;
cursor:pointer;
}

.whatsapp{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
color:white;
padding:16px;
border-radius:50%;
font-size:22px;
text-decoration:none;
}

</style>
</head>

<body>

<header>
<div class="logo">Nexstream</div>
</header>

<div class="banner">
<h1>Servicios de Streaming</h1>
<p>Compra cuentas al mejor precio</p>
</div>

<div class="container">

<div class="grid">

<div class="card">
<img src="https://upload.wikimedia.org/wikipedia/commons/0/08/Netflix_2015_logo.svg">
<h3>Netflix Premium</h3>
<div class="price">S/15</div>
<button onclick="comprar('Netflix Premium')">Comprar</button>
</div>

<div class="card">
<img src="https://upload.wikimedia.org/wikipedia/commons/3/3e/Disney%2B_logo.svg">
<h3>Disney+</h3>
<div class="price">S/10</div>
<button onclick="comprar('Disney Plus')">Comprar</button>
</div>

<div class="card">
<img src="https://upload.wikimedia.org/wikipedia/commons/1/19/Spotify_logo_without_text.svg">
<h3>Spotify Premium</h3>
<div class="price">S/8</div>
<button onclick="comprar('Spotify Premium')">Comprar</button>
</div>

</div>

</div>

<a class="whatsapp" href="https://wa.me/51967787059">💬</a>

<script>

function comprar(servicio){

let mensaje = "Hola quiero comprar: " + servicio;

let url = "https://wa.me/51967787059?text=" + encodeURIComponent(mensaje);

window.open(url);

}

</script>

</body>
</html>
