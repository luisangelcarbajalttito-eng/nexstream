<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Nexstream</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0b0b0b;
color:white;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px;
background:black;
}

.logo{
font-size:30px;
font-weight:bold;
color:red;
}

.search{
padding:10px;
width:250px;
border-radius:5px;
border:none;
}

.banner{
background:linear-gradient(90deg,#000,#111);
padding:80px 40px;
}

.banner h1{
font-size:40px;
margin-bottom:10px;
}

.banner p{
color:#aaa;
}

.container{
padding:40px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:25px;
}

.card{
background:#141414;
border-radius:10px;
padding:20px;
text-align:center;
transition:0.3s;
}

.card:hover{
transform:scale(1.05);
}

.card img{
width:120px;
margin-bottom:15px;
}

.price{
color:#00ff88;
font-size:18px;
margin:10px 0;
}

button{
background:red;
border:none;
padding:10px 20px;
color:white;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#ff2a2a;
}

.whatsapp{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
color:white;
padding:16px;
border-radius:50%;
font-size:22px;
text-decoration:none;
}

footer{
text-align:center;
padding:30px;
color:#777;
}

</style>
</head>

<body>

<header>

<div class="logo">Nexstream</div>

<input class="search" placeholder="Buscar servicio...">

</header>


<div class="banner">

<h1>Plataforma de Streaming</h1>
<p>Compra cuentas de streaming al mejor precio</p>

</div>


<div class="container">

<h2>Servicios populares</h2>

<div class="grid">

<div class="card">
<img src="https://upload.wikimedia.org/wikipedia/commons/0/08/Netflix_2015_logo.svg">
<h3>Netflix Premium</h3>
<div class="price">S/ 15</div>
<button>Comprar</button>
</div>

<div class="card">
<img src="https://upload.wikimedia.org/wikipedia/commons/3/3e/Disney%2
