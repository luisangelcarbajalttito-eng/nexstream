<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Nexstream</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0b0b0b;
color:white;
text-align:center;
}

header{
background:black;
padding:20px;
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
font-size:28px;
color:red;
font-weight:bold;
}

.container{
padding:40px;
}

input{
display:block;
margin:10px auto;
padding:10px;
width:220px;
border:none;
border-radius:6px;
}

button{
background:red;
color:white;
border:none;
padding:10px 20px;
border-radius:6px;
cursor:pointer;
margin:5px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
margin-top:30px;
}

.card{
background:#141414;
padding:20px;
border-radius:10px;
}

.price{
color:#00ff88;
margin:10px 0;
}

</style>
</head>

<body>

<header>
<div class="logo">Nexstream</div>
<div id="usuario"></div>
</header>

<div class="container">

<h2>Registro / Login</h2>

<input id="email" placeholder="Correo">
<input id="password" placeholder="Contraseña" type="password">

<button onclick="registrar()">Registrarse</button>
<button onclick="login()">Iniciar sesión</button>

<div id="catalogo" style="display:none">

<h2>Servicios disponibles</h2>

<div class="grid">

<div class="card">
<h3>Netflix Premium</h3>
<div class="price">S/15</div>
<button onclick="comprar('Netflix Premium')">Comprar</button>
</div>

<div class="card">
<h3>Disney+</h3>
<div class="price">S/10</div>
<button onclick="comprar('Disney Plus')">Comprar</button>
</div>

<div class="card">
<h3>Spotify Premium</h3>
<div class="price">S/8</div>
<button onclick="comprar('Spotify Premium')">Comprar</button>
</div>

</div>

</div>

</div>

<script>

let usuarioActual = localStorage.getItem("usuario");

if(usuarioActual){
document.getElementById("usuario").innerText = "👤 " + usuarioActual;
document.getElementById("catalogo").style.display="block";
}

function registrar(){

let email=document.getElementById("email").value;
let password=document.getElementById("password").value;

localStorage.setItem("usuario",email);
localStorage.setItem("password",password);

alert("Usuario registrado");

}

function login(){

let email=document.getElementById("email").value;
let password=document.getElementById("password").value;

let guardado=localStorage.getItem("usuario");
let pass=localStorage.getItem("password");

if(email==guardado && password==pass){

localStorage.setItem("usuario",email);

location.reload();

}else{

alert("Datos incorrectos");

}

}

function comprar(servicio){

let mensaje="Hola quiero comprar "+servicio;

let url="https://wa.me/51967787059?text="+encodeURIComponent(mensaje);

window.open(url);

}

</script>

</body>
</html>
