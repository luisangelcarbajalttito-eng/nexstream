<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Nexstream</title>

<!-- Librería Supabase -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body { margin:0; font-family:Arial; background:#0b0b0b; color:white; }
header{background:black; padding:20px; display:flex; justify-content:space-between; align-items:center;}
.logo{font-size:28px;color:red;font-weight:bold;}
.container{padding:40px;}
.grid{display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:20px;}
.card{background:#141414;padding:20px;border-radius:10px; text-align:center;}
button{background:red;color:white;border:none;padding:10px 20px;border-radius:6px;cursor:pointer;margin-top:10px;}
.price{color:#00ff88;margin:10px 0;}
</style>
</head>

<body>

<header>
<div class="logo">Nexstream</div>
</header>

<div class="container">
<h2>Servicios Disponibles</h2>
<div class="grid" id="catalogo"></div>
</div>

<script>
// Conectar con Supabase
const supabaseUrl = "https://idpdauotniuaqymycjwv.supabase.co";
const supabaseKey = "sb_publishable_Fxo6zidRkmuYlQP2-rNuZg_1SwV5J1H";
const supabase = Supabase.createClient(supabaseUrl, supabaseKey);

// Cargar productos desde Supabase
async function cargarProductos(){
  let { data, error } = await supabase.from('products').select('*');
  if(error){ console.log(error); return; }

  const catalogo = document.getElementById("catalogo");
  catalogo.innerHTML = "";

  data.forEach(producto=>{
    const div = document.createElement("div");
    div.className="card";
    div.innerHTML = `
      <h3>${producto.nombre}</h3>
      <div class="price">S/ ${producto.precio}</div>
      <button onclick="comprar('${producto.nombre}')">Comprar</button>
    `;
    catalogo.appendChild(div);
  });
}

// Función botón comprar
function comprar(servicio){
  const url="https://wa.me/51967787059?text=" + encodeURIComponent("Hola, quiero comprar: "+servicio);
  window.open(url);
}

// Cargar productos al iniciar
cargarProductos();
</script>

</body>
</html>
